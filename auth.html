<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Авторизація</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* # форма входа и регистрации */
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            color: var(--text);
            padding: 24px;
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        .auth-card {
            width: min(520px, 100%);
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 28px;
            box-shadow: 0 24px 58px rgba(15, 23, 42, 0.08);
            padding: 38px;
        }
        .auth-card h1 {
            margin: 0 0 10px;
            font-size: 2rem;
            letter-spacing: -0.03em;
        }
        .auth-card p {
            margin: 0 0 28px;
            color: var(--muted);
            max-width: 420px;
        }
        .auth-field {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }
        .auth-field label {
            font-size: 0.95rem;
            color: var(--muted);
        }
        .auth-field input {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 14px 16px;
            background: var(--surface);
            color: var(--text);
            font-size: 1rem;
        }
        .auth-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            justify-content: space-between;
        }
        .auth-actions button {
            min-width: 140px;
            border: 1px solid transparent;
            background: var(--text);
            color: #ffffff;
            border-radius: 14px;
            padding: 14px 18px;
            cursor: pointer;
            font-weight: 700;
        }
        .auth-actions button:hover {
            background: #111111;
        }
        .auth-toggle {
            color: var(--muted);
            font-size: 0.95rem;
        }
        .auth-toggle a {
            color: var(--text);
            text-decoration: underline;
            cursor: pointer;
        }
        .message {
            margin-top: 18px;
            color: var(--text);
            font-size: 0.95rem;
            min-height: 1.2em;
        }
        @media (max-width: 520px) {
            .auth-card { padding: 24px; }
            .auth-actions {
                flex-direction: column;
                align-items: stretch;
            }
            .auth-actions button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <!-- # страница логина -->
    <div class="auth-card">
        <h1 id="formTitle">Увійти</h1>
        <p id="formSubtitle">Увійдіть, щоб зберегти свої завдання та синхронізувати дані.</p>

        <div class="auth-field">
            <label for="usernameInput">Ім'я користувача</label>
            <input id="usernameInput" type="text" placeholder="Ваше ім'я" autocomplete="username">
        </div>
        <div class="auth-field">
            <label for="passwordInput">Пароль</label>
            <input id="passwordInput" type="password" placeholder="Пароль" autocomplete="current-password">
        </div>
        <div class="auth-field" id="confirmPasswordField" style="display:none;">
            <label for="confirmPasswordInput">Підтвердіть пароль</label>
            <input id="confirmPasswordInput" type="password" placeholder="Підтвердіть пароль" autocomplete="new-password">
        </div>

        <div class="auth-actions">
            <button id="submitBtn" onclick="submitForm()">Увійти</button>
            <span class="auth-toggle" id="toggleText">Немає аккаунта? <a onclick="switchMode('register')">Зареєструватись</a></span>
        </div>
        <div class="message" id="message"></div>
    </div>

    <script>
        // # скрипт формы входа/регистрации
        const params = new URLSearchParams(window.location.search);
        let mode = params.get('action') === 'register' ? 'register' : 'login';
        const formTitle = document.getElementById('formTitle');
        const formSubtitle = document.getElementById('formSubtitle');
        const submitBtn = document.getElementById('submitBtn');
        const toggleText = document.getElementById('toggleText');
        const message = document.getElementById('message');
        const confirmField = document.getElementById('confirmPasswordField');

        function safeEncode(value) {
            return btoa(encodeURIComponent(value));
        }
        function safeDecode(value) {
            return decodeURIComponent(atob(value));
        }

        function getUsers() {
            const stored = localStorage.getItem('plannerUsers');
            try {
                return stored ? JSON.parse(stored) : {};
            } catch (error) {
                return {};
            }
        }

        function saveUsers(users) {
            localStorage.setItem('plannerUsers', JSON.stringify(users));
        }

        function showMessage(text, isError = true) {
            message.textContent = text;
            message.style.color = isError ? 'var(--danger)' : 'var(--primary)';
        }

        function switchMode(newMode) {
            mode = newMode;
            const registration = mode === 'register';
            formTitle.textContent = registration ? 'Реєстрація' : 'Увійти';
            formSubtitle.textContent = registration ? 'Створіть обліковий запис, щоб зберігати плани.' : 'Увійдіть до свого облікового запису.';
            submitBtn.textContent = registration ? 'Зареєструватись' : 'Увійти';
            // email field removed — email is optional and stored empty
            confirmField.style.display = registration ? 'flex' : 'none';
            toggleText.innerHTML = registration ? 'Вже є аккаунт? <a onclick="switchMode(\'login\')">Увійти</a>' : 'Немає аккаунта? <a onclick="switchMode(\'register\')">Зареєструватись</a>';
            message.textContent = '';
        }

        function submitForm() {
            const username = document.getElementById('usernameInput').value.trim();
            const password = document.getElementById('passwordInput').value;
            const email = '';
            const confirmPassword = document.getElementById('confirmPasswordInput') ? document.getElementById('confirmPasswordInput').value : '';

            // Username: only English letters and digits
            const userPattern = /^[A-Za-z0-9]+$/;
            // Password: minimum 6 characters, English letters and digits only
            const passPattern = /^[A-Za-z0-9]{6,}$/;

            if (!username || !password) {
                showMessage('Заповніть імʼя користувача та пароль.');
                return;
            }

            if (!userPattern.test(username)) {
                showMessage('Імʼя користувача: тільки англійські літери та цифри.');
                return;
            }

            if (!passPattern.test(password)) {
                showMessage('Пароль повинен містити лише англійські літери та цифри і мати не менше 6 символів.');
                return;
            }

            const users = getUsers();
            const normalizedUser = username.toLowerCase();

            if (mode === 'register') {
                if (!confirmPassword) {
                    showMessage('Підтвердження пароля обов\'язкове.');
                    return;
                }
                if (password !== confirmPassword) {
                    showMessage('Паролі не співпадають.');
                    return;
                }
                if (users[normalizedUser]) {
                    showMessage('Користувач вже існує. Оберіть інше імʼя.');
                    return;
                }
                users[normalizedUser] = {
                    username: username,
                    email: '',
                    password: safeEncode(password),
                    avatar: null,
                    banner: null
                };
                saveUsers(users);
                localStorage.setItem('plannerCurrentUser', username);
                showMessage('Реєстрація успішна! Перенаправлення...', false);
                setTimeout(() => window.location.href = 'index.html', 1200);
            } else {
                const user = users[normalizedUser];
                if (!user || safeDecode(user.password) !== password) {
                    showMessage('Невірні дані. Спробуйте ще.');
                    return;
                }
                localStorage.setItem('plannerCurrentUser', user.username);
                showMessage('Вхід успішний! Перенаправлення...', false);
                setTimeout(() => window.location.href = 'index.html', 900);
            }
        }

        switchMode(mode);
    </script>
</body>
</html>
